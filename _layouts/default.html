<!DOCTYPE html>
<html lang="en">
  {% include head.html %}
  <body>
      {% include header.html %}
      <div id="particles-js"></div>
      <div class="calculator-wrapper container-fluid">
        <div class="row justify-content-center align-items-start">
          <div class="col-12">
            {{ content }}
          </div>
        </div>
      </div>
      {% include footer.html %}
      
      <!-- Load particles.js -->
      <script src="//cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js" defer></script>
      
      <!-- Load scripts without defer for onclick handlers -->
      <script>
        console.log('[DEBUG] Loading firebase.js...');
        document.addEventListener('error', function(e) {
          if (e.target.tagName === 'SCRIPT') {
            console.error('[DEBUG] Script failed to load:', e.target.src);
          }
        }, true);
      </script>
      <script src="assets/js/firebase.js" onload="console.log('[DEBUG] firebase.js loaded')"></script>
      <script src="assets/js/main.js" onload="console.log('[DEBUG] main.js loaded')"></script>
      <script src="assets/js/calculator-erp.js" onload="console.log('[DEBUG] calculator-erp.js loaded')"></script>
      <script>
        console.log('[DEBUG] Checking if handleLogin is defined:', typeof handleLogin);
      </script>
      
      <!-- Bootstrap JS - load only after page is ready -->
      <script>
        // Only load Bootstrap JS when needed
        document.addEventListener('DOMContentLoaded', function() {
          const bootstrapScript = document.createElement('script');
          bootstrapScript.src = 'https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js';
          bootstrapScript.defer = true;
          document.body.appendChild(bootstrapScript);
        });
      </script>
  </body>
</html>
